<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Library</title>
</head>
<body>
    <div class="menu">
        <h1>Library</h1>
        <button type="button" id="new_book_btn">Add Book</button>
    </div>
    <div class="container">
        <div class="bookshelf">
            
        </div>
        <div class="new_book_form" >
            <label for="new_title">Title: <input type="text" name="new_title" id="new_title"></label>
            <label for="new_author">Author: <input type="text" name="new_author" id="new_author"></label>
            <label for="new_pages">Pages: <input type="number" name="new_pages" id="new_pages"></label>
            <label for="new_has_read">Has Read: <input type="checkbox" name="new_has_read" id="new_has_read"></label>
            <button type="button" id="submit_btn">Submit</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
